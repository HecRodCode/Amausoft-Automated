version: '3.8'

x-airflow-common: &airflow-common
  build:
    context: ..
    dockerfile: Dockerfile
  env_file:
    - .env
  user: "${AIRFLOW_UID:-50000}:0"
  volumes:
    - ../dags:/opt/airflow/dags
    - ../src:/opt/airflow/src
    - ../data:/opt/airflow/data
    - airflow_logs:/opt/airflow/logs
  environment:
    PYTHONPATH: /opt/airflow
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CELERY__BROKER_URL: amqp://${RABBIT_USER}:${RABBIT_PASSWORD}@${MASTER_IP}:5672//
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@${MASTER_IP}:5432/${DB_NAME}
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${DB_USER}:${DB_PASSWORD}@${MASTER_IP}:5432/${DB_NAME}

services:
  airflow-worker:
    <<: *airflow-common
    command: airflow celery worker --autoscale 4,1
    restart: always
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery --app airflow.providers.celery.executors.celery_executor.app inspect ping"
        ]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  airflow_logs: